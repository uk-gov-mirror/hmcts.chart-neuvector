# Default values for chart-neuvector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

useWorkloadIdentity: true

rules:
  admission:
    enable: true
    mode: "protect"  # one of: monitor, protect
    includeDefaultRules: true
    defaultRules:
      - action: allow
        comment: Allow admin namespaces
        criteria:
          - name: namespace
            op: containsAny
            value: knode-system,monitoring,flux-system,dynatrace,azureserviceoperator-system,cert-manager,keda,admin,kured,artifactory,pact-broker
      - action: allow
        comment: Allow HMCTS registries
        criteria:
          - name: imageRegistry
            op: containsAny
            value: https://hmctsprod.azurecr.io,https://hmctssbox.azurecr.io/,https://hmctspublic.azurecr.io/,https://hmctsprivate.azurecr.io/,https://sdshmctspublic.azurecr.io/
      - action: deny
        comment: Default deny
        criteria:
          - name: imageRegistry
            op: containsAny
            value: https://localhost/,https://*.*/
    rules: []
    admClientMode: "service"
  response:
    # Response rules are rendered as NvResponseRuleSecurityRule CRDs (NeuVector 2.8.8+).
    # Each entry maps 1:1 to a CRD instance. The 'name' field is used as the
    # Kubernetes resource name and must be a valid DNS subdomain (lowercase
    # alphanumeric characters, '-' or '.', and must start and end with an
    # alphanumeric character).
    # Available events: event, security-event, cve-report, compliance, admission-control
    # Available actions: quarantine, suppress-log, webhook
    # Example:
    #   policies:
    #     - name: admission-control-denied
    #       event: admission-control
    #       conditions:
    #         - type: name
    #           value: Admission.Control.Denied
    #       actions:
    #         - webhook
    #       disable: false
    policies: []
  network:
    includeDefaultRules: true
    defaultRules:
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: allpods
          namespace: ""
        spec:
          dlp:
            settings: []
            status: true
          egress:
            - action: allow
              applications:
                - HTTP
                - PostgreSQL
                - SSL
              name: AzurePostgreSQL-egress-0
              ports: tcp/5432
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: '*.postgres.database.azure.com'
                name: AzurePostgreSQL
                original_name: ""
            - action: allow
              applications:
                - HTTP
                - SSL
              name: ApplicationInsights-egress-1
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: dc.services.visualstudio.com
                  - key: address
                    op: =
                    value: rt.services.visualstudio.com
                  - key: address
                    op: =
                    value: dc.applicationinsights.microsoft.com
                  - key: address
                    op: =
                    value: euw.rt.prod.applicationinsights.trafficmanager.net
                name: ApplicationInsights
                original_name: ""
            - action: allow
              applications:
                - HTTP
                - SSL
              name: GovUkNotify-egress-2
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: api.notifications.service.gov.uk
                name: GovUkNotify
                original_name: ""
            - action: allow
              applications:
                - HTTP
                - SSL
              name: GovUkPay-egress-3
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: publicapi.payments.service.gov.uk
                name: GovUkPay
                original_name: ""
            - action: allow
              applications:
                - HTTP
                - SSL
              name: GovUkBankHolidays-egress-4
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: www.gov.uk
                name: GovUkBankHolidays
                original_name: ""
            - action: allow
              applications:
                - SSL
              name: ServiceBus-egress-5
              ports: tcp/5671
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: '*.servicebus.windows.net'
                name: ServiceBus
                original_name: ""
            - action: allow
              applications:
                - any
              name: Mta-egress-6
              ports: tcp/25
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: mta.reform.hmcts.net
                name: Mta
                original_name: ""
            - action: allow
              applications:
                - SSL
              name: Idam-egress-7
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: idam-api.platform.hmcts.net
                name: Idam
                original_name: ""
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: namespace
                  op: =
                  value: '*'
              name: AllPods
              original_name: ""
          waf:
            settings: []
            status: true
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: applicationinsights
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: dc.services.visualstudio.com
                - key: address
                  op: =
                  value: rt.services.visualstudio.com
                - key: address
                  op: =
                  value: dc.applicationinsights.microsoft.com
                - key: address
                  op: =
                  value: euw.rt.prod.applicationinsights.trafficmanager.net
              name: ApplicationInsights
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: azurepostgresql
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: '*.postgres.database.azure.com'
              name: AzurePostgreSQL
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: govukbankholidays
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: www.gov.uk
              name: GovUkBankHolidays
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: govuknotify
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: api.notifications.service.gov.uk
              name: GovUkNotify
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: govukpay
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: publicapi.payments.service.gov.uk
              name: GovUkPay
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: idam
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: idam-api.platform.hmcts.net
              name: Idam
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: servicebus
          namespace: ""
        spec:
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: '*.servicebus.windows.net'
              name: ServiceBus
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: containers
          namespace: ""
        spec:
          dlp:
            settings: []
            status: true
          egress: []
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: container
                  op: =
                  value: '*'
              name: containers
              original_name: ""
          waf:
            settings: []
            status: true
    rules: []

groups: []

config:
  sleep: 180
  forceLicenseUpdate: false
  # Set to true via a Flux patch to enable verbose curl output and response body
  # logging for troubleshooting without requiring a code change.
  debug: false

neuvector:
  registry: hmctsprod.azurecr.io
  crdwebhook:
    enabled: false

  containerd:
    enabled: true

  manager:
    image:
      repository: imported/neuvector/manager
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - neuvector-manager-pod
              topologyKey: "kubernetes.io/hostname"
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.azure.com/mode
                  operator: In
                  values:
                    - system
    svc:
      type: ClusterIP
    ingress:
      httpredirect: false
    env:
      ssl: true
  cve:
    scanner:
      image:
        repository: imported/neuvector/scanner
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - neuvector-scanner-pod
                topologyKey: "kubernetes.io/hostname"
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/mode
                    operator: In
                    values:
                      - system
    updater:
      image:
        repository: imported/neuvector/updater
  controller:
    image:
      repository: imported/neuvector/controller
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - neuvector-controller-pod
              topologyKey: "kubernetes.io/hostname"
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.azure.com/mode
                  operator: In
                  values:
                    - system
    ingress:
      enabled: true
      host: neuvector.hmcts.com
      path: "/api"
    apisvc:
      type: ClusterIP

  enforcer:
    image:
      repository: imported/neuvector/enforcer

global:
  enableKeyVaults: true
  tenantId: 531ff96d-0ae9-462a-8d2d-bec7c0b42082

keyvault:
  licensesecretname: neuvector-license-dev
