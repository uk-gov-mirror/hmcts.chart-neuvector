{{- if .Values.rules.admission.enable }}
{{- $includeDefaultRules := true -}}
{{- if hasKey .Values.rules.admission "includeDefaultRules" -}}
{{- $includeDefaultRules = .Values.rules.admission.includeDefaultRules -}}
{{- end -}}
{{- $defaultRules := list -}}
{{- if $includeDefaultRules -}}
{{- $defaultRules = (.Values.rules.admission.defaultRules | default (list)) -}}
{{- end -}}
{{- $rules := concat (.Values.rules.admission.rules | default (list)) $defaultRules -}}
apiVersion: neuvector.com/v1
kind: NvAdmissionControlSecurityRule
metadata:
  name: local
spec:
  config:
    client_mode: {{ .Values.rules.admission.admClientMode }}
    enable: true
    mode: {{ .Values.rules.admission.mode }}
{{- if $rules }}
  rules:
{{ toYaml $rules | indent 2 }}
{{- else }}
  rules: []
{{- end }}
{{- end }}
